<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#16213e">
  <title>Shelf Reader</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ── Camera Screen ── -->
  <div id="camera-screen" class="screen">
    <header class="header">
      <div>
        <h1>Shelf Reader</h1>
        <div class="subtitle">LC Call Number Checker</div>
      </div>
      <button class="btn btn-ghost" id="btn-manual-entry" style="width:auto;height:36px;padding:0 12px;font-size:13px;">
        Manual
      </button>
    </header>

    <div class="viewfinder-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="capture-canvas" style="display:none"></canvas>

      <div class="viewfinder-overlay">
        <div class="guide-box">
          <div class="guide-label">Aim at call number labels</div>
        </div>
      </div>

      <div id="camera-error" style="display:none">
        <div class="error-icon">📷</div>
        <h2>Camera Unavailable</h2>
        <p>Camera access is required to scan call number labels.</p>
        <button class="btn btn-secondary" id="btn-retry-camera" style="width:200px;margin-top:8px">
          Try Again
        </button>
      </div>
    </div>

    <div class="camera-controls">
      <p class="camera-hint">Hold steady, then tap Scan</p>
      <button class="btn btn-primary" id="btn-scan">
        📷 &nbsp; Scan Shelf
      </button>
    </div>
  </div>

  <!-- ── Processing Screen ── -->
  <div id="processing-screen" class="screen hidden">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div id="progress-label" class="progress-label">Starting OCR…</div>
      <div class="progress-bar-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p style="color:var(--text-muted);font-size:12px;text-align:center;max-width:240px">
        OCR can take 5–15 seconds on mobile
      </p>
    </div>
  </div>

  <!-- ── Results Screen ── -->
  <div id="results-screen" class="screen hidden">
    <header class="header">
      <div>
        <h1>Results</h1>
        <div class="subtitle">Tap a call number to edit</div>
      </div>
    </header>

    <div class="results-body">
      <img id="capture-thumb" class="capture-thumb" alt="Captured shelf" style="display:block">

      <div id="summary-bar" class="summary-bar"></div>

      <div class="section-label">Call Numbers (shelf order)</div>
      <div id="cn-list" class="cn-list"></div>

      <div class="section-label" style="margin-top:16px">Add / Fix</div>
      <div class="add-cn-row">
        <input
          id="add-cn-input"
          class="add-cn-input"
          type="text"
          placeholder="e.g. UA 163 .S66 2015"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
        >
        <button id="btn-add-cn" class="btn-add">+</button>
      </div>
    </div>

    <div class="results-footer">
      <button class="btn btn-primary" id="btn-scan-again">
        📷 &nbsp; Scan Again
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Tesseract.js v5 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
